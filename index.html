<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GMod Loading Screen</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100%; height: 100%;
            overflow: hidden; background: #000;
        }

        /* Растягиваем видео на весь экран без исключений */
        #bgvideo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: fill; /* Растягивание */
            z-index: 1;
        }
    </style>
</head>
<body>

    <video id="bgvideo" loop muted playsinline>
        <source src="video/claim.webm" type="video/webm">
    </video>

    <audio id="bgaudio" loop>
        <source src="video/claim.mp3" type="audio/mpeg">
    </audio>

    <script>
        const video = document.getElementById('bgvideo');
        const audio = document.getElementById('bgaudio');

        function startMedia() {
            // Устанавливаем громкость (на случай, если CEF сбрасывает её)
            audio.volume = 1.0;

            // Запускаем видео
            video.play().then(() => {
                console.log("Video started");
            }).catch(err => console.log("Video error: ", err));

            // Запускаем аудио
            audio.play().then(() => {
                console.log("Audio started");
            }).catch(err => console.log("Audio error: ", err));

            // Синхронизация времени
            audio.currentTime = video.currentTime;
        }

        // 1. Попытка запуска сразу при инициализации скрипта
        startMedia();

        // 2. Попытка при полной загрузке DOM
        document.addEventListener('DOMContentLoaded', startMedia);

        // 3. Попытка при полной загрузке всех ресурсов (картинки, стили)
        window.onload = startMedia;

        // 4. "Агрессивный" метод: пробуем запускать каждые 500мс, пока не заиграет
        const forcePlay = setInterval(() => {
            if (video.paused || audio.paused) {
                startMedia();
            } else {
                clearInterval(forcePlay);
            }
        }, 500);
    </script>
</body>
</html>
