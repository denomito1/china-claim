<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fullscreen Video</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
    video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: fill; /* РАСТЯГИВАЕМ БЕЗ СОХРАНЕНИЯ ПРОПОРЦИЙ */
    }
  </style>
</head>
<body>
  <video id="bgVideo"
         src="video/claim.mp4"
         autoplay
         playsinline>
  </video>

  <script>
    const video = document.getElementById('bgVideo');

    function goFullscreen() {
      if (video.requestFullscreen) video.requestFullscreen();
      else if (video.webkitRequestFullscreen) video.webkitRequestFullscreen();
      else if (video.msRequestFullscreen) video.msRequestFullscreen();
    }

    window.addEventListener('load', () => {
      video.play().then(goFullscreen).catch(goFullscreen);
    });
  </script>
</body>
</html>
