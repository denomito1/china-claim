<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden; background: #000;
        }
        video {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: fill; /* Растягивание */
            display: block;
        }
    </style>
</head>
<body>

    <video id="bgvideo" loop muted playsinline>
        <source src="video/claim.webm" type="video/webm">
    </video>

    <audio id="bgaudio" loop>
        <source src="video/claim.mp3" type="audio/mpeg">
    </audio>

    <script>
        var vid = document.getElementById("bgvideo");
        var aud = document.getElementById("bgaudio");

        function playAll() {
            // Запускаем оба элемента
            vid.play();
            aud.play();

            // Синхронизация (если аудио отстает или спешит)
            aud.currentTime = vid.currentTime;
        }

        // Попытка запуска при загрузке
        window.onload = function() {
            playAll();
        };

        // Запасной вариант для GMod CEF
        document.addEventListener('DOMContentLoaded', playAll);

        // Если видео по какой-то причине перезапустится (loop), сбросим и звук
        vid.oniteration = function() {
            aud.currentTime = 0;
            aud.play();
        };
    </script>
</body>
</html>
