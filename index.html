<!DOCTYPE html>
<html>
<head>
    <style>
    /* Убираем все отступы и скрываем скроллбары */
    body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
    }

    video {
        position: absolute;
        top: 0;
        left: 0;
        /* Жестко задаем размеры по размеру окна */
        width: 100%;
        height: 100%;
        /* fill игнорирует пропорции и растягивает видео точно по границам */
        object-fit: fill;
        display: block;
    }
</style>
</head>
<body>
    <video autoplay loop playsinline id="bgvideo">
        <source src="video/claim.webm" type="video/webm">
        </video>

    <script>
        var vid = document.getElementById("bgvideo");
        vid.onloadstart = function() {
            vid.play();
        };
        // Форсированный старт для GMod
        document.addEventListener('DOMContentLoaded', function() {
            vid.play();
        });
    </script>
</body>
</html>
