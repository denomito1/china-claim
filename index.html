<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        /* Полное обнуление отступов и скрытие прокрутки */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            /* 'fill' растянет видео ровно на весь экран. 
               Если нужно сохранить пропорции, используйте 'cover' */
            object-fit: fill; 
            display: block;
        }
    </style>
</head>
<body>

    <video autoplay loop playsinline>
        <source src="/video/claim.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

</body>
</html>
