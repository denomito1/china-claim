<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Fullscreen Video</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
    video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover; /* растягиваем, сохраняя пропорции, обрезая лишнее */
    }
  </style>
</head>
<body>
  <video id="bgVideo"
         src="video/claim.mp4"
         autoplay
         playsinline>
    Ваш браузер не поддерживает видео.
  </video>

  <script>
    const video = document.getElementById('bgVideo');

    // как только можно играть — пробуем включить полноэкранный режим
    function goFullscreen() {
      if (video.requestFullscreen) {
        video.requestFullscreen().catch(() => {});
      } else if (video.webkitRequestFullscreen) {
        video.webkitRequestFullscreen();
      } else if (video.msRequestFullscreen) {
        video.msRequestFullscreen();
      }
    }

    // запускаем воспроизведение и fullscreen после загрузки
    window.addEventListener('load', () => {
      video.play().then(goFullscreen).catch(goFullscreen);
    });
  </script>
</body>
</html>
